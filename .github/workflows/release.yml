name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSNEPPX_BUILD_TESTS=ON -DSNEPPX_BUILD_TOOLS=ON -DSNEPPX_USE_LTO=ON

      - name: Build all targets
        run: cmake --build build --config Release --parallel

      - name: Run full test suite
        working-directory: build
        run: ctest -C Release --output-on-failure

      - name: Build Python bindings
        run: |
          cmake -B build_py -DCMAKE_BUILD_TYPE=Release -DSNEPPX_BUILD_PYTHON=ON
          cmake --build build_py --config Release

      - name: Package
        run: cpack --config build/CPackConfig.cmake -B packages

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sneppx-${{ runner.os }}
          path: packages/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate release notes
        run: |
          echo "## SNEPPX Algo Release" > release_notes.md
          echo "See git log for details." >> release_notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sneppx-ubuntu-latest/*.tar.gz
            sneppx-windows-latest/*.tar.gz
            sneppx-macos-latest/*.tar.gz
          body_path: release_notes.md
