# GitHub Packages — Docker and Python package publishing for sneppx-alg
# Publishes to GitHub Container Registry (ghcr.io)

name: GitHub Packages

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ammar49-cyber
  PYTHON_VERSION: "3.11"

jobs:
  # =====================================================================
  # Docker — sneppx-alg (CPU + CUDA)
  # =====================================================================
  docker-sneppx:
    name: Docker (SNEPPX-ALG)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, cuda]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/sneppx-alg
          tags: |
            type=ref,event=tag
            type=raw,value=${{ matrix.variant }}
            type=raw,value=${{ matrix.variant }}-latest
            type=sha,prefix=${{ matrix.variant }}-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant == 'cpu' && 'Dockerfile.cpu' || 'Dockerfile' }}
          target: ${{ matrix.variant == 'cpu' && 'cpu-runtime' || 'cuda-runtime' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================================
  # Python — sneppx-alg wheel on GitHub Packages
  # =====================================================================
  python-publish:
    name: Python (sneppx-alg)
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          pip install --no-cache-dir build twine keyring

      - name: Build wheel
        run: |
          cd bindings/python
          python -m build --wheel --no-isolation

      - name: Publish to GitHub Packages
        run: |
          python -m twine upload --repository-url "https://github.com/${{ env.OWNER }}/sneppx-alg/packages" \
            bindings/python/dist/*.whl \
            --username __token__ --password "${{ secrets.GITHUB_TOKEN }}"
